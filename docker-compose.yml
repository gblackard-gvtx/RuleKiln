services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rulekiln
      POSTGRES_PASSWORD: rulekiln
      POSTGRES_DB: rulekiln
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rulekiln"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.5.0
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts ${MLFLOW_ALLOWED_HOSTS:-localhost,127.0.0.1,mlflow,mlflow:5000}
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rulekiln:rulekiln@postgres:5432/rulekiln
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8010}:8000"
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./.rulekiln:/app/.rulekiln
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rulekiln:rulekiln@postgres:5432/rulekiln
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ARTIFACT_ROOT: .rulekiln/runs
      ENABLE_PGVECTOR: "false"
      EXECUTION_BACKEND: dbos
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      uvicorn src.rulekiln.api.app:app
      --host 0.0.0.0
      --port 8000
      --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./src:/app/src
      - ./.rulekiln:/app/.rulekiln
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://rulekiln:rulekiln@postgres:5432/rulekiln
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ARTIFACT_ROOT: .rulekiln/runs
      ENABLE_PGVECTOR: "false"
      EXECUTION_BACKEND: dbos
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: python -m rulekiln.workers.dbos_worker

volumes:
  postgres_data:
  mlflow_data:
