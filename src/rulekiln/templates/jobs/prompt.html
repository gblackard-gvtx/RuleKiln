{% extends "base.html" %}
{% block title %} — Prompt{% endblock %}

{% block content %}
<div class="flex items-center gap-3 mb-2">
  <a href="/ui/jobs/{{ pv.job_id }}" class="text-gray-400 hover:text-gray-600 text-sm">← Job detail</a>
</div>

<h1 class="text-2xl font-bold text-gray-900 mb-2">Selected Prompt</h1>

<dl class="grid grid-cols-2 gap-x-4 gap-y-2 text-sm mb-6">
  <dt class="text-gray-500">Version ID</dt>
  <dd class="font-mono text-xs">{{ pv.id }}</dd>
  <dt class="text-gray-500">Strategy</dt>
  <dd><span class="badge badge-running">{{ pv.strategy }}</span></dd>
  <dt class="text-gray-500">Prompt hash</dt>
  <dd class="font-mono text-xs">{{ pv.prompt_hash }}</dd>
  <dt class="text-gray-500">Task</dt>
  <dd>{{ pv.task_name }}</dd>
</dl>

<div class="card mb-4" x-data="{ copied: false }">
  <div class="flex items-center justify-between mb-2">
    <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">System Prompt</h2>
    <button type="button"
            @click="navigator.clipboard.writeText($refs.promptText.innerText); copied = true; setTimeout(() => copied = false, 2000)"
            class="text-xs text-indigo-600 hover:text-indigo-800 border border-indigo-300
                   rounded px-2 py-0.5">
      <span x-text="copied ? '✓ Copied' : 'Copy'">Copy</span>
    </button>
  </div>
  <pre class="code-block" x-ref="promptText">{{ pv.system_prompt | e }}</pre>
</div>

<div>
  <a href="/ui/jobs/{{ pv.job_id }}/artifacts/download?path=outputs/selected_distilled_prompt.md"
     class="border border-gray-300 text-gray-700 hover:bg-gray-50 text-sm font-medium
            px-4 py-2 rounded-md inline-block">
    Download .md
  </a>
</div>
{% endblock %}
