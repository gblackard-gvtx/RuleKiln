{% extends "base.html" %}
{% block title %} — Import CSV{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 mb-2">Import CSV</h1>
  <p class="text-gray-500 text-sm mb-6">
    Upload a CSV file to generate a task definition and case set for distillation.
  </p>

  {% if errors %}
  <div class="flash-error mb-6" role="alert">
    <p class="font-semibold mb-2">Errors:</p>
    <ul class="list-disc list-inside space-y-1 text-sm">
      {% for e in errors %}<li>{{ e }}</li>{% endfor %}
    </ul>
  </div>
  {% endif %}

  <form action="/ui/import/csv/preview" method="post" enctype="multipart/form-data"
        class="card space-y-5">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="csv_file">
        CSV File <span class="text-red-500">*</span>
      </label>
      <input id="csv_file" name="csv_file" type="file" accept=".csv" required
             class="block w-full text-sm text-gray-600 file:mr-3 file:py-1.5 file:px-3
                    file:rounded file:border file:border-gray-300 file:text-sm
                    file:bg-gray-50 hover:file:bg-gray-100 cursor-pointer" />
    </div>

    <hr class="border-gray-200" />

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="task_id">
          Task ID <span class="text-red-500">*</span>
        </label>
        <input id="task_id" name="task_id" type="text" required
               placeholder="e.g. sentiment-classification"
               class="w-full rounded border border-gray-300 text-sm px-2.5 py-1.5
                      focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="task_name">
          Task Name <span class="text-red-500">*</span>
        </label>
        <input id="task_name" name="task_name" type="text" required
               placeholder="e.g. Sentiment Classification"
               class="w-full rounded border border-gray-300 text-sm px-2.5 py-1.5
                      focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="task_mode">
        Task Mode <span class="text-red-500">*</span>
      </label>
      <select id="task_mode" name="task_mode" required
              class="w-full rounded border border-gray-300 text-sm px-2.5 py-1.5
                     focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        <option value="" disabled selected>Select mode…</option>
        {% for m in task_modes %}
        <option value="{{ m }}">{{ m }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="description">
        Description
      </label>
      <textarea id="description" name="description" rows="2"
                placeholder="Brief description of this task…"
                class="w-full rounded border border-gray-300 text-sm px-2.5 py-1.5
                       focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
    </div>

    <div class="flex justify-end pt-2">
      <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium
                     px-6 py-2 rounded-md transition-colors">
        Analyze CSV →
      </button>
    </div>
  </form>
</div>
{% endblock %}
