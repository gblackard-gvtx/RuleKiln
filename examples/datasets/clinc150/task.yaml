schema_version: rulekiln.task.v1

task_id: clinc150_intent_classification
task_name: CLINC150 Intent Classification
task_mode: classification

description: >
  Classify a customer-service query into exactly one of 150 in-scope intent
  labels or the out-of-scope (oos) category.

